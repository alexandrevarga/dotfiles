# =====================================================================
# CONFIGURAÇÃO ULTRA PRODUTIVA DO TMUX
# =====================================================================

# 1. Mudar o prefixo padrão de Ctrl+b para Ctrl+a (estilo 'screen')
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 2. Ativar suporte total ao Mouse (Scroll, cliques e redimensionamento)
set -g mouse on

# 3. Atalhos super intuitivos para dividir a tela (Painéis)
# Use Prefix + ' para dividir verticalmente (lado a lado)
# Use Prefix + - para dividir horizontalmente (cima/baixo)
bind "'" split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 4. Navegar entre painéis usando Alt + Setas (sem precisar do prefixo!)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# 5. Começar a contagem de Janelas e Painéis em 1 (em vez de 0, que fica longe no teclado)
set -g base-index 1
setw -g pane-base-index 1

# 6. Atualizar a configuração rapidamente com Prefix + r
bind r source-file ~/.tmux.conf \; display-message "Configuration reloaded successfully! 🚀"

# 7. Design moderno (barra de status elegante)
set -g status-style bg=black,fg=cyan
set -g status-left-length 30
set -g status-left '#[fg=green] 🖥️  Session: #S '
set -g status-right '#[fg=yellow] 📅 %Y-%m-%d %H:%M '

# 8. Modo VI para cópia (Resolve o conflito do Ulauncher)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# 9. Plugin Manager (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum Configuration
set -g @continuum-restore 'on' # Automatically restore the last saved session
set -g @continuum-save-interval '15' # Save every 15 minutes

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
