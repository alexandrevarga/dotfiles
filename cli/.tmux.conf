# =====================================================================
# CONFIGURAÇÃO ULTRA PRODUTIVA DO TMUX
# =====================================================================

# 1. Mudar o prefixo padrão de Ctrl+b para Ctrl+a (estilo 'screen')
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 2. Ativar suporte total ao Mouse (Scroll, cliques e redimensionamento)
set -g mouse on

# 3. Atalhos super intuitivos para dividir a tela (Painéis)
# Use Prefix + ' para dividir verticalmente (lado a lado)
# Use Prefix + - para dividir horizontalmente (cima/baixo)
bind "'" split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 4. Navegar entre painéis usando Alt + Setas (sem precisar do prefixo!)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# 5. Começar a contagem de Janelas e Painéis em 1 (em vez de 0, que fica longe no teclado)
set -g base-index 1
setw -g pane-base-index 1

# 6. Atualizar a configuração rapidamente com Prefix + r
bind r source-file ~/.tmux.conf \; display-message "Configuration reloaded successfully! 🚀"

# 7. Design moderno SRE (Minimalista e Transparente)
set -g status-style bg=default,fg=cyan
set -g status-justify left
# Sessão em Ciano Puro (Sem enfeites no Tmux)
set -g status-left-length 40
set -g status-left '#[fg=cyan,bold] #S #[fg=default,nobold] '

# Abas (Janelas)
set -g window-status-style "fg=colour244"
set -g window-status-format " #I #W "
set -g window-status-current-style "fg=colour208,bold"
set -g window-status-current-format " #[fg=colour208]❯ #[fg=colour208,bold]#W "

# Status da Direita (Tempo)
set -g status-right '#[fg=colour244] %H:%M #[fg=cyan,bold]  '

# 8. Modo VI para cópia (Resolve o conflito do Ulauncher)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# 9. Plugin Manager (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum Configuration
set -g @continuum-restore 'on' # Automatically restore the last saved session
set -g @continuum-save-interval '15' # Save every 15 minutes

# 10. Auto-Renomeação Nativa SRE (Zero Subprocess Forks)
set -g automatic-rename on
set -g automatic-rename-format "#{?#{==:#W,Tools},Tools,#{b:pane_current_path}}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

