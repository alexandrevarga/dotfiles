# =====================================================================
# TMUX - ULTRA-PRODUCTIVE SRE CONFIGURATION
# =====================================================================

# 1. Change the default prefix from Ctrl+b to Ctrl+a (screen-style)
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 2. Enable full mouse support (scroll, clicks, and pane resizing)
set -g mouse on

# 3. Intuitive pane split shortcuts
# Use Prefix + ' to split vertically (side by side)
# Use Prefix + - to split horizontally (top/bottom)
bind "'" split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 4. Navigate between panes using Alt + Arrows (no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# 5. Start window and pane numbering at 1 (0 is too far from the keyboard)
set -g base-index 1
setw -g pane-base-index 1

# 6. Reload configuration quickly with Prefix + r
bind r source-file ~/.tmux.conf \; display-message "Configuration reloaded successfully! 🚀"

# 7. Modern SRE design (minimalist and transparent)
set -g status-style bg=default,fg=cyan
set -g status-justify left
# Session name in pure cyan
set -g status-left-length 40
set -g status-left '#[fg=cyan,bold] #S #[fg=default,nobold] '

# Windows (tabs)
set -g window-status-style "fg=colour244"
set -g window-status-format " #I #W "
set -g window-status-current-style "fg=colour208,bold"
set -g window-status-current-format " #[fg=colour208]❯ #[fg=colour208,bold]#W "

# Right status (clock)
set -g status-right '#[fg=colour244] %H:%M #[fg=cyan,bold]  '

# 8. VI copy mode (also resolves Ulauncher keybinding conflict)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# 9. Plugin Manager (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Continuum configuration
set -g @continuum-restore 'on'         # Automatically restore the last saved session
set -g @continuum-save-interval '15'   # Save every 15 minutes

# 10. Native SRE auto-rename (zero subprocess forks)
set -g automatic-rename on
set -g automatic-rename-format "#{?#{==:#W,Tools},Tools,#{b:pane_current_path}}"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
