# Forçar o uso da decodificação de vídeo por hardware VA-API.
# Isso descarrega o trabalho da CPU para a GPU Intel.
hwdec=vaapi

# Definir a saída de vídeo para o renderizador moderno 'gpu'.
vo=gpu

# Usar o contexto nativo do Wayland para o renderizador de GPU.
# Esta é a opção mais eficiente e livre de "tearing" para o seu ambiente.
gpu-context=wayland

# Pipeline de Áudio Audiófilo e de Alta Fidelidade
ao=pipewire                 # Força a saída nativa de alta performance do PipeWire
audio-format=float          # Saída nativa em 32-bit float (bit-depth perfeito para o PipeWire/EasyEffects)
audio-channels=stereo       # Garante estéreo puro
video-sync=display-resample # Mantém áudio e vídeo perfeitamente sincronizados de forma fluida

# Configurações do SoX Resampler (soxr) apenas para transposição ativa do F4 (432Hz)
# Ao desativar o pitch correction, a reamostragem física usará precisão extrema
audio-resample-filter-size=32
audio-resample-linear=yes

# Integração Audiófila com yt-dlp & Bypass de Proteção de Bots do YouTube
# Passa os cookies da sua sessão do Floorp Flatpak e habilita o Node.js como runtime
# de JavaScript para decodificar o "n challenge" do YouTube em tempo real de forma estável.
ytdl-raw-options-append=cookies-from-browser=firefox:/home/alexandre/.var/app/one.ablaze.floorp/.floorp/7yukfwbf.default-default/
ytdl-raw-options-append=js-runtimes=node

